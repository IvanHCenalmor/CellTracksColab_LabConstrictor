name: CellTracksColab
version: 0.0.1
environment_file: environment.yaml
installer_type: all
license_file: LICENSE
icon_image: app/logo/CellTracksColab_logo.png
conclusion_text: Thank you! You have successfully installed CellTracksColab 0.0.1.
keep_pkgs: false
register_python: false
initialize_conda: false
extra_files:
- app/bash_bat_scripts/pre_uninstall.sh: pre_uninstall.sh
- app/bash_bat_scripts/uninstall.sh: uninstall.sh
- app/logo/CellTracksColab_logo.icns: CellTracksColab/CellTracksColab_logo.icns
- app/logo/CellTracksColab_logo.ico: CellTracksColab/CellTracksColab_logo.ico
- app/logo/CellTracksColab_logo.png: CellTracksColab/CellTracksColab_logo.png
- app/menuinst/Welcome.ipynb: CellTracksColab/notebooks/Welcome.ipynb
- app/menuinst/notebook_launcher.json: CellTracksColab/notebook_launcher.json
- app/python_scripts/hide_code_cells.py: CellTracksColab/hide_code_cells.py
- app/python_scripts/include_path.py: CellTracksColab/include_path.py
- construct.yaml: CellTracksColab/construct.yaml
- notebooks/notebook_latest_versions.yaml: CellTracksColab/notebook_latest_versions.yaml
- requirements.txt: CellTracksColab/requirements.txt
- requirements_gpu.txt: CellTracksColab/requirements_gpu.txt
post_install: app/bash_bat_scripts/post_install.bat # [win]
post_install: app/bash_bat_scripts/post_install.sh # [unix]
pre_uninstall: app/bash_bat_scripts/pre_uninstall.bat # [win]
pre_uninstall: app/bash_bat_scripts/pre_uninstall.sh # [unix]
